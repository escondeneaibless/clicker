<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>Clicker</title>
</head>
<body>
    <div class="points-container">
        <input type="text" name="" id="points" value="">
        <div class="floating-numbers"></div>
    </div>
    <label id="speed"></label>
    <button class="click" id="btn1"></button>
    <div class="grid-upgrades">
        <div class="column">
            <h3>Улучшить силу</h3>
            <div class="upgrades click-upgrades">
                <button class="upgrade" id="btn2">+1 за 10 points</button>
                <button class="upgrade" id="btn3">+11 за 125 points</button>
                <button class="upgrade" id="btn4">+24 за 910 points</button>
                <button class="upgrade" id="btn5">+500 за 30000 points</button>
            </div>
        </div>
        <div class="column">
            <h3>Улучшить скорость</h3>
            <div class="upgrades speed-upgrades">
                <button class="upgrade" id="btn6">Скорость +1 за 10 points</button>
                <button class="upgrade" id="btn7">Скорость +10 за 150 points</button>
                <button class="upgrade" id="btn8">Скорость +30 за 1000 points</button>
                <button class="upgrade" id="btn9">Скорость +500 за 30000 points</button>
            </div>
        </div>
    </div>

    <script src="./function.js"></script>
</body>
</html>
